# The app targets SDK 36 (Android 16); Robolectric 4.14 ships SDK jars only up to 34.
sdk=34
# Use a no-op Application in JVM tests: the real App.onCreate() inits Supabase (session storage),
# which throws on the plain JVM/Robolectric environment. Tests exercise units, not the whole app.
application=android.app.Application
